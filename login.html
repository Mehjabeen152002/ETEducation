<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="dynamic-title">ETEducation Portal</title>
    <script src="https://cdn.tailwindcss.com"></script> <!-- Ensures Tailwind is loaded -->
    <style>
        /* Animation for dynamic title */
        @keyframes fadeIn {
            0% { opacity: 0; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1); }
        }

        .dynamic-title {
            font-size: 2rem;
            font-weight: bold;
            color: #f5f2f8; /* Violet color */
            letter-spacing: 2px;
            animation: fadeIn 1s ease-out forwards;
        }

        .dynamic-title span {
            color: #efd8e0; /* Pink color */
        }

        /* Styling for password visibility toggle button */
        .toggle-password {
            position: absolute;
            top: 50%;
            right: 15px; /* Adjust the right margin to ensure it doesn't overlap */
            transform: translateY(-50%); /* Center the icon vertically */
            cursor: pointer;
            color: #6a0dad;
        }
    </style>
    <script>
        // JavaScript to set the dynamic title
        function updateWebsiteName() {
            const websiteName = "ETEducation"; // Website Name
            document.getElementById("dynamic-title").innerText = websiteName; // Update dynamic name
        }

        // Run the function on page load
        window.onload = updateWebsiteName;
    </script>
</head>

<body class="bg-gray-100 flex flex-col min-h-screen">
    <!-- Navbar -->
    <nav class="bg-violet-700 text-white p-4 flex justify-between items-center shadow-md w-full">
        <div class="flex items-center space-x-3">
            <img src="https://cdn-icons-png.flaticon.com/512/1765/1765425.png" alt="ETEducation Logo" class="w-10 h-10" /> <!-- Logo -->
            <h1 id="dynamic-title" class="dynamic-title">ETEducation</h1> <!-- Dynamic Website Name with style -->
        </div>
        <!-- Responsive Navigation -->
        <div class="space-x-6 hidden md:flex">
            <a href="index.html" class="text-white hover:text-gray-300 font-medium">Home</a>
            <a href="about.html" class="text-white hover:text-gray-300 font-medium">About</a>
            <a href="courses.html" class="text-white hover:text-gray-300 font-medium">Courses</a>
            <a href="Ask questions.html" class="text-white hover:text-gray-300 font-medium">Ask Questions</a>
            <a href="contact.html" class="text-white hover:text-gray-300 font-medium">Contact</a>
            <a href="login.html" class="bg-white text-violet-700 px-4 py-2 rounded hover:bg-gray-200 font-semibold">Login</a>
        </div>
        <!-- Mobile Menu Toggle (Hamburger) -->
        <div class="md:hidden flex items-center">
            <button id="menu-btn" class="text-white">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                </svg>
            </button>
        </div>
    </nav>

    <!-- Mobile Menu (Initially Hidden) -->
    <div id="mobile-menu" class="md:hidden hidden bg-violet-700 text-white text-center space-y-4 p-4">
        <a href="index.html" class="block hover:text-gray-300 font-medium">Home</a>
        <a href="about.html" class="block hover:text-gray-300 font-medium">About</a>
        <a href="courses.html" class="block hover:text-gray-300 font-medium">Courses</a>
        <a href="Ask questions.html" class="block hover:text-gray-300 font-medium">Ask Questions</a>
        <a href="contact.html" class="block hover:text-gray-300 font-medium">Contact</a>
        <a href="login.html" class="block bg-white text-violet-700 px-4 py-2 rounded hover:bg-gray-200 font-semibold">Login</a>
    </div>

    <!-- Login Card -->
    <div class="bg-white p-8 rounded-lg shadow-lg max-w-md w-full mt-10 mx-auto">
        <h2 class="text-3xl font-bold text-center text-violet-700">Login</h2>
        <p class="text-gray-600 text-center mt-2">Sign in to continue</p>

        <!-- Login Form -->
        <form class="mt-6" onsubmit="return validateForm()">
            <div class="mb-4">
                <label class="block text-gray-700 font-medium">Email</label>
                <input type="email" id="email" class="w-full p-2 border rounded focus:outline-none focus:ring-2 focus:ring-indigo-500" placeholder="Enter your email" required>
            </div>

            <div class="mb-4 relative">
                <label class="block text-gray-700 font-medium">Password</label>
                <input type="password" id="password" class="w-full p-2 border rounded focus:outline-none focus:ring-2 focus:ring-indigo-500" placeholder="Enter your password" required>
                <button type="button" onclick="togglePassword()" class="toggle-password">👁</button>
            </div>

            <div class="flex justify-between items-center mb-4">
                <label class="flex items-center">
                    <input type="checkbox" class="mr-2"> Remember me
                </label>
                <!-- Updated Forgot Password link to point to password.html -->
                <a href="password.html" class="text-indigo-600 hover:underline">Forgot password?</a>
            </div>

            <button type="submit" class="w-full bg-indigo-700 text-white py-2 rounded-lg hover:bg-indigo-800 transition duration-300">
                Login
            </button>
        </form>

        <p class="text-center text-gray-600 mt-4">Don't have an account?
            <a href="signup.html" class="text-indigo-600 hover:underline">Sign Up</a>
        </p>
    </div>

    <!-- Footer -->
    <footer class="bg-violet-700 text-white text-center py-6 mt-auto">
        <p>&copy; 2025 ETEducation | Rajshahi University of Engineering & Technology</p>
    </footer>

    <!-- JavaScript for Validation & Show Password -->
    <script>
        function validateForm() {
            var email = document.getElementById("email").value;
            var password = document.getElementById("password").value;

            if (email.trim() === "" || password.trim() === "") {
                alert("Please fill in all fields.");
                return false;
            }
            return true;
        }

        function togglePassword() {
            var passwordField = document.getElementById("password");
            if (passwordField.type === "password") {
                passwordField.type = "text";
            } else {
                passwordField.type = "password";
            }
        }
    </script>
    <script>
        // Toggle mobile menu visibility
        const menuBtn = document.getElementById('menu-btn');
        const mobileMenu = document.getElementById('mobile-menu');

        menuBtn.addEventListener('click', () => {
            mobileMenu.classList.toggle('hidden');
        });
    </script>
</body>

</html>
