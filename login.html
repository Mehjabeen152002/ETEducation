<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | ETE Department Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen">

    <!-- Login Card -->
    <div class="bg-white p-8 rounded-lg shadow-lg max-w-md w-full">
        <h2 class="text-3xl font-bold text-center text-violet-700">Login</h2>
        <p class="text-gray-600 text-center mt-2">Sign in to continue</p>

        <!-- Login Form -->
        <form class="mt-6" onsubmit="return validateForm()">
            <div class="mb-4">
                <label class="block text-gray-700 font-medium">Email</label>
                <input type="email" id="email"
                    class="w-full p-2 border rounded focus:outline-none focus:ring-2 focus:ring-indigo-500"
                    placeholder="Enter your email" required>
            </div>

            <div class="mb-4 relative">
                <label class="block text-gray-700 font-medium">Password</label>
                <input type="password" id="password"
                    class="w-full p-2 border rounded focus:outline-none focus:ring-2 focus:ring-indigo-500"
                    placeholder="Enter your password" required>
                <button type="button" onclick="togglePassword()" class="absolute top-10 right-3 text-gray-600">
                    👁
                </button>
            </div>

            <div class="flex justify-between items-center mb-4">
                <label class="flex items-center">
                    <input type="checkbox" class="mr-2"> Remember me
                </label>
                <a href="#" class="text-indigo-600 hover:underline">Forgot password?</a>
            </div>

            <button type="submit"
                class="w-full bg-indigo-700 text-white py-2 rounded-lg hover:bg-indigo-800 transition duration-300">
                Login
            </button>
        </form>

        <p class="text-center text-gray-600 mt-4">Don't have an account?
            <a href="signup.html" class="text-indigo-600 hover:underline">Sign Up</a>
        </p>
    </div>

    <!-- JavaScript for Validation & Show Password -->
    <script>
        function validateForm() {
            var email = document.getElementById("email").value;
            var password = document.getElementById("password").value;

            if (email.trim() === "" || password.trim() === "") {
                alert("Please fill in all fields.");
                return false;
            }
            return true;
        }

        function togglePassword() {
            var passwordField = document.getElementById("password");
            if (passwordField.type === "password") {
                passwordField.type = "text";
            } else {
                passwordField.type = "password";
            }
        }
    </script>

</body>

</html>
